name: Auto-download resume from overleaf
description: Fetches a resume pdf from an overleaf and commits it to the repository.
author: sbrjt

inputs:
  overleaf_url:
    required: true
    description: Read-url from overleaf
  github_token:
    required: true
    description: GitHub token for authentication
  gdrive_link:
    description: Google drive link with edit permission
  gdrive_service_account_key:
    description: JSON credentials for the Google Drive service account

runs:
  using: 'composite'
  steps:
    - name: Checkout repo
      uses: actions/checkout@v7

    - name: Copy requirements.txt
      shell: bash
      run: cp "$GITHUB_ACTION_PATH/requirements.txt" "$GITHUB_WORKSPACE/requirements.txt"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: pip install -q -r "${GITHUB_ACTION_PATH}/requirements.txt"

    - name: Run Selenium script
      id: script
      run: python "${GITHUB_ACTION_PATH}/download_from_overleaf.py" "${{ inputs.overleaf_url }}"
      shell: bash

    - name: Commit the PDF file
      id: set-output
      if: steps.script.outputs.skip != 'True'
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        git add resume.tex resume.pdf
        git commit -m "Resume updated" -q
        git push -q && \
        echo "Upload to github successful 🎉"
      env:
        GITHUB_TOKEN: '${{ inputs.github_token }}'
      shell: bash

    - name: Upload to google drive
      if: ${{ inputs.gdrive_link != '' && inputs.gdrive_service_account_key != '' && steps.script.outputs.skip != 'True'}}
      run: python "${GITHUB_ACTION_PATH}/upload_to_gdrive.py"
      env:
        GDRIVE_LINK: ${{ inputs.gdrive_link }}
        GDRIVE_SERVICE_ACCOUNT_KEY: ${{ inputs.gdrive_service_account_key }}
      shell: bash

branding:
  icon: 'book'
  color: 'green'
